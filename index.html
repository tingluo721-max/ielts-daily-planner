<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思7.0 · 每日打卡</title>
<style>

  :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --done: #4ade80; --border: #334155; --amber: #fbbf24; --purple: #a78bfa; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
  .container { max-width:960px; margin:0 auto; }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.4rem; }
  header p { color:var(--muted); font-size:0.8rem; margin-top:4px; }
  .progress-bar { width:100%; height:5px; background:var(--border); border-radius:3px; margin:10px 0 14px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--done)); border-radius:3px; transition:width .4s; }
  .stats { display:flex; gap:10px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .stat { background:var(--card); border-radius:8px; padding:8px 14px; text-align:center; }
  .stat .num { font-size:1.2rem; font-weight:700; }
  .stat .label { font-size:0.65rem; color:var(--muted); }
  .nav { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:18px; }
  .nav button { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; cursor:pointer; font-size:0.8rem; }
  .nav button:hover { border-color:var(--accent); }
  .nav .date-display { font-weight:600; min-width:140px; text-align:center; font-size:0.9rem; }
  .phase-tag { font-size:0.68rem; padding:2px 8px; border-radius:8px; background:rgba(56,189,248,.1); color:var(--accent); }
  .day-sections { display:flex; flex-direction:column; gap:12px; }
  .section { background:var(--card); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  .section-header { display:flex; align-items:center; gap:8px; padding:12px 16px; cursor:pointer; user-select:none; }
  .section-header:hover { background:rgba(255,255,255,.02); }
  .section-icon { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
  .section-title { font-weight:700; font-size:0.9rem; }
  .section-time { color:var(--muted); font-size:0.75rem; margin-left:auto; }
  .section-arrow { color:var(--muted); font-size:0.65rem; transition:transform .2s; }
  .section.open .section-arrow { transform:rotate(90deg); }
  .section-body { display:none; padding:0 16px 14px; }
  .section.open .section-body { display:block; }
  .material-box { background:rgba(0,0,0,.2); border-radius:8px; padding:12px; margin-bottom:10px; }
  .material-box h4 { font-size:0.8rem; margin-bottom:6px; color:var(--accent); }
  .material-box p, .material-box li { font-size:0.82rem; line-height:1.5; color:var(--muted); }
  .material-box a { color:var(--accent); }
  .cue-card { background:rgba(167,139,250,.06); border:1px solid rgba(167,139,250,.15); border-radius:8px; padding:12px; margin-bottom:8px; }
  .cue-card .card-title { font-weight:600; color:var(--purple); font-size:0.82rem; margin-bottom:6px; }
  .cue-card .card-prompt { font-size:0.86rem; line-height:1.45; white-space:pre-line; }
  .cue-card .card-hints { font-size:0.75rem; color:var(--muted); margin-top:4px; }
  .writing-prompt { background:rgba(251,191,36,.05); border:1px solid rgba(251,191,36,.12); border-radius:8px; padding:12px; margin-bottom:8px; }
  .writing-prompt h4 { color:var(--amber); font-size:0.82rem; }
  .reading-box { background:rgba(0,0,0,.2); border-radius:8px; padding:14px; max-height:300px; overflow-y:auto; font-family:Georgia,serif; font-size:0.85rem; line-height:1.65; color:#cbd5e1; white-space:pre-line; }
  .video-wrap { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:8px; margin:8px 0; }
  .video-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:0; }
  .vocab-list { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .vocab-word { background:rgba(255,255,255,.05); border-radius:5px; padding:3px 8px; font-size:0.78rem; }
  .vocab-word .cn { color:var(--muted); margin-left:3px; }
  .check-row { display:flex; align-items:center; gap:7px; padding:5px 0; cursor:pointer; }
  .checkbox { width:18px; height:18px; min-width:18px; border:2px solid var(--border); border-radius:4px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .checkbox.done { background:var(--done); border-color:var(--done); }
  .checkbox.done::after { content:'✓'; font-size:10px; color:#000; font-weight:700; }
  .check-label { font-size:0.82rem; }
  .check-label.done-text { text-decoration:line-through; color:var(--muted); }
  .btn-sm { background:transparent; border:1px solid var(--border); color:var(--amber); padding:4px 10px; border-radius:5px; cursor:pointer; font-size:0.75rem; margin-top:6px; display:inline-block; }
  .btn-sm:hover { border-color:var(--amber); }
  .hide { display:none; }
  .show { display:block; }
  .motivation { text-align:center; color:var(--accent); font-size:0.85rem; margin-top:14px; font-weight:500; }
  .footer { text-align:center; margin-top:18px; padding-bottom:24px; }
  .btn-reset { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:0.75rem; }
  .btn-reset:hover { color:#f87171; border-color:#f87171; }


  .vocab-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
  .vocab-card { background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; transition:all .2s; min-height:60px; }
  .vocab-card:hover { border-color:var(--accent); background:rgba(56,189,248,.05); }
  .vocab-card.flipped .vc-front { display:none; }
  .vocab-card .vc-back { display:none; }
  .vocab-card.flipped .vc-back { display:block; }
  .vocab-card.mastered-card { opacity:.5; border-color:rgba(74,222,128,.2); }
  .vc-front { display:flex; align-items:center; }
  .vc-btn { border:none; border-radius:4px; padding:3px 10px; cursor:pointer; font-size:0.72rem; font-weight:600; }
  .vc-yes { background:rgba(74,222,128,.2); color:var(--done); }
  .vc-yes:hover { background:rgba(74,222,128,.35); }
  .vc-no { background:rgba(248,113,113,.15); color:#f87171; }
  .vc-no:hover { background:rgba(248,113,113,.3); }
  .review-card { border-left:3px solid var(--purple); }

</style>
</head>

  <div class="nav">
    <button onclick="changeDay(-1)">◀ 前一天</button>
    <span class="date-display" id="dateDisplay"></span>
    <button onclick="changeDay(1)">后一天 ▶</button>

</div>

  '\u{1f4dd} 写作不是写得越多越好。改好一篇胜过写五篇。',
  '\u{1f3a4} 录音自己听很尴尬？那正是进步的开始。别跳过。',
  '\u{23f0} 60 天很短，但足够从 5.5 冲到 7.0。别浪费任何一天。',
  '\u{1f442} 耳朵需要时间打开。坚持两周你会感受到质变。',
  '\u{1f4d6} 每天 50-60 个新词 + 复习，60 天后词汇量翻倍。',
  '\u{1f3c6} CET-6 都过了，雅思 7.0 只差两个月的专注。加油。',
];

function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function getDayOffset() {
  var t = new Date(); t.setHours(0,0,0,0);
  var s = new Date(START_DATE); s.setHours(0,0,0,0);
  return Math.max(0, Math.min(Math.floor((t-s)/(1000*60*60*24)), 59));
}

var currentDay = getDayOffset();

function toggleInner(el) {
  var cb = el.querySelector('.checkbox');
  var label = el.querySelector('.check-label');
  var key = el.getAttribute('data-key');
  var state = loadState();
  state[key] = !state[key];
  saveState(state);
  if (state[key]) { cb.classList.add('done'); label.classList.add('done-text'); }
  else { cb.classList.remove('done'); label.classList.remove('done-text'); }
  updateStats();
}

function toggleSection(header) {
  header.parentElement.classList.toggle('open');
}


const VOCAB_KEY = 'ielts_vocab_state';
const REVIEW_INTERVALS = [1, 2, 4, 7, 15, 30];

function loadVocabState() { try { return JSON.parse(localStorage.getItem(VOCAB_KEY)) || {}; } catch(e) { return {}; } }
function saveVocabState(s) { localStorage.setItem(VOCAB_KEY, JSON.stringify(s)); }

function getVocabForDay(dayOffset) {
  if (dayOffset < 8) return DETAILED_VOCAB[dayOffset] || [];
  if (dayOffset < 22) return DETAILED_VOCAB_P2[dayOffset - 8] || [];
  return [];
}

function getReviewWords(todayOffset) {
  var state = loadVocabState();
  var reviewWords = [];
  for (var key in state) {
    var ws = state[key];
    if (ws.stage === 'mastered') continue;
    var daysSinceReview = todayOffset - ws.lastReviewDay;
    var nextInterval = REVIEW_INTERVALS[ws.stage] || 30;
    if (daysSinceReview >= nextInterval && ws.stage < REVIEW_INTERVALS.length) {
      reviewWords.push({word:ws.word, pos:ws.pos, cn:ws.cn, example:ws.example||'', key:key, stage:ws.stage, firstDay:ws.firstDay});
    }
  }
  reviewWords.sort(function(a,b){ var aDays=todayOffset-loadVocabState()[a.key].lastReviewDay; var bDays=todayOffset-loadVocabState()[b.key].lastReviewDay; return bDays-aDays; });
  return reviewWords;
}

function markWordKnown(wordKey, word, pos, cn, example, todayOffset) {
  var state = loadVocabState();
  if (state[wordKey]) { state[wordKey].stage = Math.min(state[wordKey].stage+1, REVIEW_INTERVALS.length); state[wordKey].lastReviewDay = todayOffset; }
  else { state[wordKey] = {word:word, pos:pos, cn:cn, example:example, firstDay:todayOffset, lastReviewDay:todayOffset, stage:0}; }
  if (state[wordKey].stage >= REVIEW_INTERVALS.length) state[wordKey].stage = 'mastered';
  saveVocabState(state);
}

function markWordUnknown(wordKey, word, pos, cn, example, todayOffset) {
  var state = loadVocabState();
  state[wordKey] = {word:word, pos:pos, cn:cn, example:example, firstDay:todayOffset, lastReviewDay:todayOffset, stage:0};
  saveVocabState(state);
}

function countMastered() { var state=loadVocabState(); var c=0; for(var k in state){if(state[k].stage==='mastered')c++;} return c; }
function countLearning() { var state=loadVocabState(); var c=0; for(var k in state){if(state[k].stage!=='mastered')c++;} return c; }

function renderVocabSection(dayOffset) {
  var newWords = getVocabForDay(dayOffset);
  var reviewWords = getReviewWords(dayOffset);
  var mastered = countMastered();
  var learning = countLearning();
  var html = '';
  
  html += '<div class="material-box" style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">';
  html += '<div style="font-weight:700;font-size:0.88rem">📖 词汇库</div>';
  html += '<div style="font-size:0.76rem;color:var(--muted)">✅ 已掌握: <b style="color:var(--done)">'+mastered+'</b></div>';
  html += '<div style="font-size:0.76rem;color:var(--muted)">🔄 学习中: <b style="color:var(--amber)">'+learning+'</b></div>';
  html += '<div style="font-size:0.76rem;color:var(--muted)">📋 今日新词: <b style="color:var(--accent)">'+newWords.length+'</b></div>';
  html += '<div style="font-size:0.76rem;color:var(--muted)">⏰ 待复习: <b style="color:var(--purple)">'+reviewWords.length+'</b></div>';
  html += '</div>';
  
  if (reviewWords.length > 0) {
    html += '<div class="material-box"><h4>⏰ 艾宾浩斯复习（'+reviewWords.length+'个）</h4><p style="font-size:0.73rem;color:var(--muted);margin-bottom:8px">根据记忆曲线今天该复习这些词，点击卡片翻转查看释义</p><div class="vocab-grid">';
    for (var i = 0; i < Math.min(reviewWords.length, 15); i++) {
      var w = reviewWords[i];
      var daysAgo = dayOffset - w.firstDay;
      html += '<div class="vocab-card review-card" id="vc_'+w.key+'" onclick="flipCard(this)">';
      html += '<div class="vc-front"><b>'+w.word+'</b><span style="font-size:0.68rem;color:var(--muted);margin-left:6px">'+w.pos+'</span><span style="font-size:0.6rem;color:var(--purple);margin-left:auto">'+daysAgo+'天前</span></div>';
      html += '<div class="vc-back"><div>'+w.cn+'</div>';
      if (w.example) html += '<div style="font-size:0.68rem;color:var(--muted);margin-top:3px">📎 '+w.example+'</div>';
      html += '<div style="margin-top:6px;display:flex;gap:6px">';
      html += '<button class="vc-btn vc-yes" onclick="event.stopPropagation();markWordKnown(\''+w.key+'\',\''+w.word+'\',\''+w.pos+'\',\''+w.cn+'\',\''+(w.example||'').replace(/'/g,"\\'")+'\','+dayOffset+');refreshVocab('+dayOffset+')">认识 ✓</button>';
      html += '<button class="vc-btn vc-no" onclick="event.stopPropagation();markWordUnknown(\''+w.key+'\',\''+w.word+'\',\''+w.pos+'\',\''+w.cn+'\',\''+(w.example||'').replace(/'/g,"\\'")+'\','+dayOffset+');refreshVocab('+dayOffset+')">不认识 ↻</button>';
      html += '</div></div></div>';
    }
    html += '</div></div>';
  }
  
  if (newWords.length > 0) {
    var state = loadVocabState();
    html += '<div class="material-box"><h4>🆕 今日新词（'+newWords.length+'个）</h4><p style="font-size:0.73rem;color:var(--muted);margin-bottom:8px">点击卡片翻转查看释义，然后标记认识/不认识</p><div class="vocab-grid">';
    for (var i = 0; i < newWords.length; i++) {
      var w = newWords[i];
      var wordKey = 'w_'+w[0].replace(/[^a-zA-Z]/g,'').toLowerCase();
      var alreadyKnown = state[wordKey] && state[wordKey].stage === 'mastered';
      html += '<div class="vocab-card'+(alreadyKnown?' mastered-card':'')+'" id="vcn_'+wordKey+'" onclick="flipCard(this)">';
      html += '<div class="vc-front"><b>'+w[0]+'</b><span style="font-size:0.68rem;color:var(--muted);margin-left:6px">'+w[1]+'</span>'+(alreadyKnown?'<span style="margin-left:auto;font-size:0.7rem">✅</span>':'')+'</div>';
      html += '<div class="vc-back"><div>'+w[2]+'</div>';
      if (w[3]) html += '<div style="font-size:0.68rem;color:var(--muted);margin-top:3px">📎 '+w[3]+'</div>';
      html += '<div style="margin-top:6px;display:flex;gap:6px">';
      html += '<button class="vc-btn vc-yes" onclick="event.stopPropagation();markWordKnown(\''+wordKey+'\',\''+w[0]+'\',\''+w[1]+'\',\''+w[2]+'\',\''+(w[3]||'').replace(/'/g,"\\'")+'\','+dayOffset+');refreshVocab('+dayOffset+')">认识 ✓</button>';
      html += '<button class="vc-btn vc-no" onclick="event.stopPropagation();markWordUnknown(\''+wordKey+'\',\''+w[0]+'\',\''+w[1]+'\',\''+w[2]+'\',\''+(w[3]||'').replace(/'/g,"\\'")+'\','+dayOffset+');refreshVocab('+dayOffset+')">不认识 ↻</button>';
      html += '</div></div></div>';
    }
    html += '</div></div>';
  }
  
  var d = DAYS_DATA[dayOffset];
  if (d && d.vocab.new_words > 0) {
    html += '<div class="material-box"><p style="font-size:0.78rem;color:var(--muted)">📋 扇贝同步：今日背 <b>'+d.vocab.new_words+'</b> 个新词。页面词汇与扇贝互补使用。</p></div>';
  }
  
  return html;
}

function flipCard(card) { card.classList.toggle('flipped'); }

function refreshVocab(dayOffset) {
  var vocabEl = document.getElementById('vocab-content');
  if (vocabEl) { vocabEl.innerHTML = renderVocabSection(dayOffset); }
  updateStats();
}

function renderDay(dayOffset) {
  var d = DAYS_DATA[dayOffset];
  if (!d) return;
  
  document.getElementById('phaseTag').textContent = d.phase;
  document.getElementById('dateDisplay').textContent = d.title;
  document.getElementById('statDay').textContent = dayOffset + 1;

  var state = loadState();
  var secs = [
    { id:'listen', icon:'\u{1f3a7}', label:'听力', time:'75min', color:'rgba(56,189,248,.15)',
      html: (function() { if (d.listen.video_url) { if (d.listen.video_url.indexOf('bilibili') !== -1) { var bv = d.listen.video_url.split('bvid=')[1]?.split('&')[0] || ''; return '<div class="material-box"><h4>\u{1f4fa} '+d.listen.video_title+'</h4><p style="margin:10px 0">\u{1f3a7} <a href="https://www.bilibili.com/video/'+bv+'" target="_blank" style="font-size:1.05rem;font-weight:600;color:#38bdf8;text-decoration:underline">\u{25b6} 点击打开B站视频（新标签页）</a></p><p style="margin-top:4px">'+d.listen.task+'</p></div>'; } return '<div class="material-box"><h4>\u{1f4fa} '+d.listen.video_title+'</h4><div class="video-wrap"><iframe src="'+d.listen.video_url+'" allowfullscreen loading="lazy"></iframe></div><p style="margin-top:6px">'+d.listen.task+'</p></div>'; } return '<div class="material-box"><h4>\u{1f4fb} '+d.listen.video_title+'</h4><p>'+d.listen.task+'</p></div>'; })() + '<div class="material-box"><p style="font-size:0.8rem">\u{1f4a1} '+d.listen.extra+'</p></div>'
    },
    { id:'speak', icon:'\u{1f5e3}\u{fe0f}', label:'口语', time:'60min', color:'rgba(167,139,250,.15)',
      html: '<div class="cue-card"><div class="card-title">Part 1 · '+d.speak.part1_topic+'</div><div class="card-prompt">'+d.speak.part1_questions+'</div></div><div class="cue-card"><div class="card-title">\u{1f399}\u{fe0f} 今日任务</div><div class="card-prompt">'+d.speak.daily_task+'</div><div class="card-hints">录音 → 回听 → 找出3个改进点 → 重说。必须要重说！</div></div>'
    },
    { id:'write', icon:'\u{270d}\u{fe0f}', label:'写作', time:'45min', color:'rgba(251,191,36,.15)',
      html: '<div class="writing-prompt"><h4>'+d.write.type+'</h4><p style="margin-top:4px">'+d.write.prompt+'</p>'+(d.write.link ? '<p style="margin-top:6px"><a href="'+d.write.link+'" target="_blank">\u{1f449} 范文链接</a></p>' : '')+'<p style="margin-top:4px;font-size:0.78rem;color:var(--muted)">\u{1f3af} '+d.write.focus+'</p></div>'
    },
    { id:'read', icon:'\u{1f4da}', label:'阅读', time:'30min', color:'rgba(74,222,128,.15)',
      html: '<div class="material-box"><h4>'+d.read.title+'</h4><div class="reading-box">'+d.read.passage+'</div></div>'
    },
    { id:'vocab', icon:'\u{1f4d6}', label:'词汇', time:'30min', color:'rgba(74,222,128,.15)',
      html: '<div id="vocab-content">'+renderVocabSection(dayOffset)+'</div>'
    }
  ];

  var grid = '';
  secs.forEach(function(s) {
    var key = 'd'+dayOffset+'_'+s.id+'_done';
    var done = state[key] || false;
    grid += '\n    <div class="section open">\n      <div class="section-header" onclick="toggleSection(this)">\n        <div class="section-icon" style="background:'+s.color+'">'+s.icon+'</div>\n        <span class="section-title">'+s.label+'</span>\n        <span class="section-time">'+s.time+'</span>\n        <span class="section-arrow">▶</span>\n      </div>\n      <div class="section-body">\n        '+s.html+'\n        <div class="check-row" onclick="toggleInner(this)" data-key="'+key+'">\n          <div class="checkbox'+(done?' done':'')+'"></div>\n          <span class="check-label'+(done?' done-text':'')+'">✅ '+s.label+'完成</span>\n        </div>\n      </div>\n    </div>';
  });
  document.getElementById('daySections').innerHTML = grid;
  updateStats();
}

function updateStats() {
  var state = loadState();
  var todayDone = 0, todayTotal = 5;
  ['listen','speak','write','read','vocab'].forEach(function(s) {
    if (state['d'+currentDay+'_'+s+'_done']) todayDone++;
  });
  document.getElementById('statDone').textContent = todayDone+'/'+todayTotal;
  document.getElementById('progressFill').style.width = (todayDone/todayTotal*100) + '%';
  
  var streak = 0;
  for (var d = currentDay; d >= 0; d--) {
    var all = true;
    for (var i = 0; i < 5; i++) {
      var s = ['listen','speak','write','read','vocab'][i];
      if (!state['d'+d+'_'+s+'_done']) { all = false; break; }
    }
    if (all) streak++; else break;
  }
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('motivation').textContent = todayDone === 5 ? '\u{1f389} 今天全完成了！明天继续！' : MOTIVATIONS[currentDay % MOTIVATIONS.length];
}

function changeDay(dir) { currentDay = Math.max(0, Math.min(currentDay + dir, 59)); renderDay(currentDay); }
function goToday() { currentDay = getDayOffset(); renderDay(currentDay); }
function resetAll() { if(confirm('确定清除所有打卡记录？')) { localStorage.removeItem(STORAGE_KEY); renderDay(currentDay); } }

renderDay(currentDay);

</script>
</body>
